<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}7 Хоногийн Тайлан{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root { --brand: #1a3a6b; --brand-light: #2563b0; }
  body  { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; font-size: 0.92rem; }
  .navbar { background: var(--brand) !important; }
  .navbar-brand { font-weight: 700; letter-spacing: .5px; }
  .card { border: none; border-radius: 10px; box-shadow: 0 1px 8px rgba(0,0,0,.07); }
  .card-header { background: var(--brand); color: #fff; border-radius: 10px 10px 0 0 !important; font-weight: 600; }
  .section-header { background: #e8edf8; border-left: 4px solid var(--brand-light);
                    padding: 6px 12px; border-radius: 4px; margin: 18px 0 10px; font-weight: 600; }
  .badge-dept { font-size: .72rem; }
  .table th { background: #e8edf8; font-size: .82rem; }
  .submitted-badge { color: #198754; font-weight: 600; }
  .pending-badge   { color: #dc3545; font-size:.8rem; }
  input[type=number] { max-width: 160px; }
  .unit-label { color: #6c757d; font-size: .8rem; margin-left: 4px; }
  .btn-brand { background: var(--brand); color: #fff; border: none; }
  .btn-brand:hover { background: var(--brand-light); color: #fff; }
</style>
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"><i class="bi bi-journal-text me-2"></i>7 Хоногийн Тайлан</a>
    <div class="d-flex gap-2 ms-auto">
      {% if session.uid %}
        <a href="/report" class="btn btn-sm btn-outline-light"><i class="bi bi-pencil-square me-1"></i>Миний тайлан</a>
        <a href="/logout" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i>Гарах</a>
      {% endif %}
      <a href="/consolidated" class="btn btn-sm btn-outline-light"><i class="bi bi-bar-chart me-1"></i>Нэгтгэл</a>
      <a href="/admin" class="btn btn-sm btn-outline-light"><i class="bi bi-gear me-1"></i>Admin</a>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ 'success' if cat=='success' else 'danger' }} alert-dismissible fade show py-2">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
