<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7 Хоногийн Тайлан — ШШГБ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--brand:#1a3a6b;--brand2:#2563b0}
body{background:#f0f2f5;font-family:'Segoe UI',Arial,sans-serif;font-size:.93rem}
.navbar{background:var(--brand)!important}
.navbar-brand{font-weight:700;letter-spacing:.4px}
.card{border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.card-header{background:var(--brand);color:#fff;border-radius:10px 10px 0 0!important;font-weight:600}
.sec-head{background:#e8edf8;border-left:4px solid var(--brand2);padding:7px 12px;
          border-radius:4px;margin:18px 0 10px;font-weight:600;color:var(--brand)}
.user-card{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:10px 14px;
           cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.user-card:hover{background:#f0f4ff;border-color:var(--brand2)}
.avatar{background:var(--brand);color:#fff;border-radius:50%;width:38px;height:38px;
        display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:.85rem}
input[type=number]{max-width:170px}
.unit{color:#6c757d;font-size:.78rem;margin-left:3px}
.view{display:none}.view.active{display:block}
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:200px}
.tbl-input{width:110px;font-size:.82rem;padding:3px 6px}
</style>
</head>

<nav class="navbar navbar-dark navbar-expand-lg mb-3">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-journal-text me-2"></i>7 Хоногийн Тайлан</span>
    <div class="d-flex gap-2 ms-auto flex-wrap">
      <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-house me-1"></i>Нүүр</button>
      <button class="btn btn-sm btn-outline-light" onclick="showView('consolidated')"><i class="bi bi-bar-chart me-1"></i>Нэгтгэл</button>
      <button class="btn btn-sm btn-outline-light" onclick="showView('admin')"><i class="bi bi-gear me-1"></i>Admin</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-3">
<div id="toast-wrap" style="position:fixed;top:70px;right:16px;z-index:9999"></div>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="row justify-content-center">
   <div class="col-lg-7">
    <div class="card mb-4">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-calendar-week me-2"></i><span id="home-week-label">...</span></span>
      <span class="badge bg-light text-dark" id="home-week-dates"></span>
     </div>
     <div class="card-body" id="home-users-list">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- REPORT -->
<div id="view-report" class="view">
  <div class="row justify-content-center">
   <div class="col-lg-9">
    <div class="card">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span id="report-title">Тайлан</span>
      <div class="d-flex gap-2 align-items-center">
       <span class="text-white-50 small" id="report-week-label"></span>
       <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-arrow-left"></i></button>
      </div>
     </div>
     <div class="card-body">
      <div id="report-submitted-info"></div>
      <form id="report-form" onsubmit="submitReport(event)">
       <div id="report-fields"></div>
       <div class="sec-head mt-4"><i class="bi bi-list-check me-1"></i>Ерөнхий тайлан</div>
       <div class="row g-3">
        <div class="col-12">
         <label class="form-label fw-semibold">Энэ 7 хоногт хийсэн ажил</label>
         <textarea class="form-control" id="f-hiiseh" name="hiiseh_ajil" rows="5" placeholder="Хийсэн ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Дараа 7 хоногт хийх ажил</label>
         <textarea class="form-control" id="f-hiikh" name="hiikh_ajil" rows="4" placeholder="Хийх ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Тэмдэглэл / санал</label>
         <textarea class="form-control" id="f-temdeg" name="temdegleltar" rows="2" placeholder="Нэмэлт тэмдэглэл..."></textarea>
        </div>
       </div>
       <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn px-4" style="background:var(--brand);color:#fff" id="submit-btn">
         <i class="bi bi-floppy me-1"></i>Хадгалах
        </button>
        <button type="button" class="btn btn-outline-secondary" onclick="showView('home')">Буцах</button>
       </div>
      </form>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- CONSOLIDATED -->
<div id="view-consolidated" class="view">
  <div class="row">
   <div class="col-12">
    <div class="card mb-3">
     <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">

      <div class="d-flex gap-2 align-items-center">
       <select class="form-select form-select-sm" id="week-selector" onchange="loadConsolidated()" style="width:auto"></select>
       <button class="btn btn-sm btn-outline-light" onclick="window.print()"><i class="bi bi-printer me-1"></i>Хэвлэх</button>
      </div>
     </div>
     <div class="card-body" id="cons-body">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="view">
  <div class="row"><div class="col-lg-10 mx-auto">

    <div class="card-header"><i class="bi bi-person-plus me-2"></i>Алба хаагч нэмэх</div>
    <div class="card-body">
     <form onsubmit="adminAddUser(event)" class="row g-3 align-items-end">
      <div class="col-md-2"><label class="form-label">Цол</label>
       <input type="text" id="a-rank" class="form-control" placeholder="д/х"></div>
      <div class="col-md-3"><label class="form-label">Нэр *</label>
       <input type="text" id="a-name" class="form-control" required placeholder="О.Нэр"></div>
      <div class="col-md-3"><label class="form-label">Хэлтэс *</label>

       <select id="a-role" class="form-select" required id="a-role"></select></div>
      <div class="col-md-1">
       <button type="submit" class="btn w-100" style="background:var(--brand);color:#fff"><i class="bi bi-plus-lg"></i></button>
      </div>
     </form>
    </div>

    <div class="card-header"><i class="bi bi-people me-2"></i>Алба хаагчдын жагсаалт</div>

    </div>
   </div>
  </div></div>
</div>

// ── Helpers ────────────────────────────────────────────
function weekDates(offset=0){
  const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1 + offset*7);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate()+6);
  const fmt = x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {start:fmt(mon), end:fmt(sun)};
}
function fmtWeek(start,end){
  return `${start.replace(/-/g,'.')} – ${end.slice(5).replace('-','.')}`;
}
function toast(msg,ok=true){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className=`alert alert-${ok?'success':'danger'} py-2 px-3 shadow`;
  el.style.cssText='min-width:260px;font-size:.9rem';
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function catKey(cat){return cat.replace(/[\s,]/g,'_').toLowerCase();}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='consolidated') loadConsolidated();
  if(name==='admin') renderAdmin();
}

// ── Seed users ─────────────────────────────────────────
async function seedUsers(){
  const snap = await getDocs(collection(db,'users'));
  if(snap.size>0) return;
  for(let i=0;i<INIT_USERS.length;i++){
    const u=INIT_USERS[i];
    await setDoc(doc(db,'users',String(i+1)),{...u,isActive:true,createdAt:serverTimestamp()});
  }
}

// ── Load users ─────────────────────────────────────────
async function loadUsers(){
  const snap=await getDocs(query(collection(db,'users'),orderBy('__name__')));
  allUsers=[];
  snap.forEach(d=>allUsers.push({id:d.id,...d.data()}));
  return allUsers;
}

// ── Current week reports ───────────────────────────────
async function loadWeekReports(weekStart){
  const snap=await getDocs(query(collection(db,'reports'),where('weekStart','==',weekStart)));
  allReports={};
  snap.forEach(d=>{const r=d.data(); allReports[r.userId]=r;});
}

// ── Render home ────────────────────────────────────────
async function renderHome(){
  const w=weekDates(); currentWeek=w;
  document.getElementById('home-week-label').textContent=fmtWeek(w.start,w.end);
  document.getElementById('home-week-dates').textContent=`${w.start} — ${w.end}`;
  await loadUsers();
  await loadWeekReports(w.start);
  const el=document.getElementById('home-users-list');
  let html='<p class="text-muted mb-3">Нэрээ сонгоно уу:</p>';
  for(const dk of DEPT_ORDER){
    const dus=allUsers.filter(u=>u.department===dk&&u.isActive);
    if(!dus.length) continue;
    html+=`<div class="sec-head">${DEPT_NAMES[dk]}</div><div class="row g-2 mb-2">`;
    for(const u of dus){
      const done=!!allReports[u.id];
      html+=`<div class="col-md-6"><div class="user-card" onclick="selectUser('${u.id}')">
        <div class="avatar">${u.name[0]}</div>
        <div class="flex-grow-1">
          <div class="fw-semibold">${u.rank} ${u.name}</div>
          <div class="text-muted" style="font-size:.78rem">${ROLE_LABELS[u.role]||u.role}</div>
        </div>
        ${done?'<span class="badge bg-success"><i class="bi bi-check"></i> Илгээсэн</span>':'<span class="badge bg-light text-muted">Хүлээгдэж байна</span>'}

  }

}
window.selectUser=function(uid){
  currentUser=allUsers.find(u=>u.id===uid);

  renderReportForm();

};

// ── Render report form ─────────────────────────────────
function renderReportForm(){
  if(!currentUser||!currentWeek) return;
  const u=currentUser;
  document.getElementById('report-title').innerHTML=
    `<i class="bi bi-pencil-square me-2"></i>${u.rank} ${u.name}
     <span class="badge ms-2" style="background:rgba(255,255,255,.2);font-size:.72rem">${ROLE_LABELS[u.role]||u.role}</span>`;
  document.getElementById('report-week-label').textContent=fmtWeek(currentWeek.start,currentWeek.end);

  // Load existing data
  const ex=allReports[u.id]||{};
  const d=ex.data||{};

  // Submitted info
  const si=document.getElementById('report-submitted-info');
  si.innerHTML=ex.submittedAt
    ? `<div class="alert alert-success py-2 mb-3"><i class="bi bi-check-circle me-1"></i>
       Хадгалсан: ${ex.submittedAt?.toDate?.()?.toLocaleString('mn-MN')||ex.submittedAt}</div>` : '';

  // Build form fields
  const secs=ROLE_FORMS[u.role]||[];
  let html='';
  if(u.role==='head'){
    html='<div class="alert alert-info"><i class="bi bi-eye me-2"></i>Та зөвхөн хяналт тавих эрхтэй. <a href="#" onclick="showView(\'consolidated\')">Нэгтгэл харах →</a></div>';
  } else {
    for(const sec of secs){
      html+=`<div class="sec-head">${sec.t}</div>`;
      if(sec.note) html+=`<p class="text-muted small">${sec.note}</p>`;
      if(sec.table){
        html+=`<div class="table-responsive mb-2"><table class="table table-sm table-bordered">
          <thead><tr><th>Ангилал</th>${sec.cols.map(c=>`<th class="text-center" style="min-width:95px">${c.l}<br><small class="text-muted">${c.u}</small></th>`).join('')}</tr></thead><tbody>`;
        for(const cat of sec.cats){
          const ck='tbl_'+catKey(cat)+'__';
          html+=`<tr><td class="fw-semibold small">${cat}</td>`;
          for(const col of sec.cols){
            const fid=ck+col.id;
            html+=`<td><input type="number" class="form-control tbl-input" name="${fid}" step="any" min="0" value="${d[fid]||''}"></td>`;
          }
          html+='</tr>';
        }
        html+='</tbody></table></div>';
      } else {
        html+='<div class="row g-3 mb-1">';
        for(const f of sec.f){
          if(f.ta){
            html+=`<div class="col-12"><label class="form-label fw-semibold">${f.l}</label>
              <textarea class="form-control" name="${f.id}" rows="2">${d[f.id]||''}</textarea></div>`;
          } else {
            html+=`<div class="col-md-6 col-lg-4">
              <label class="form-label fw-semibold">${f.l}${f.u?`<span class="unit">(${f.u})</span>`:''}</label>
              <input type="number" class="form-control" name="${f.id}" step="${f.s||'1'}" min="0" value="${d[f.id]||''}">
            </div>`;
          }
        }
        html+='</div>';
      }
    }
  }
  document.getElementById('report-fields').innerHTML=html;

  // Fill general fields
  document.getElementById('f-hiiseh').value=d.hiiseh_ajil||'';
  document.getElementById('f-hiikh').value=d.hiikh_ajil||'';
  document.getElementById('f-temdeg').value=d.temdegleltar||'';
}

// ── Submit report ───────────────────────────────────────
async function submitReport(e){
  e.preventDefault();
  if(!currentUser||!currentWeek) return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Хадгалж байна...';
  try{
    const fd=new FormData(document.getElementById('report-form'));
    const data={};
    fd.forEach((v,k)=>{if(v.trim()) data[k]=v.trim();});
    const reportId=`${currentWeek.start}_${currentUser.id}`;
    await setDoc(doc(db,'reports',reportId),{
      userId:currentUser.id, userName:currentUser.name, rank:currentUser.rank,
      department:currentUser.department, role:currentUser.role,
      weekStart:currentWeek.start, weekEnd:currentWeek.end,
      data, submittedAt:new Date().toLocaleString('mn-MN'), updatedAt:serverTimestamp()
    });
    allReports[currentUser.id]={userId:currentUser.id,data,submittedAt:new Date().toLocaleString('mn-MN')};
    toast('✓ Тайлан хадгалагдлаа');
    renderReportForm();
  } catch(err){ toast('Алдаа гарлаа: '+err.message, false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-floppy me-1"></i>Хадгалах';
}

// ── Consolidated ────────────────────────────────────────
async function loadConsolidated(){
  const sel=document.getElementById('week-selector');
  // Populate last 8 weeks
  if(!sel.options.length){
    for(let i=0;i>=–7;i--){
      const w=weekDates(i);
      const opt=document.createElement('option');
      opt.value=w.start; opt.textContent=fmtWeek(w.start,w.end);
      if(i===0) opt.selected=true;
      sel.appendChild(opt);
    }
  }
  const selWeek=sel.value||weekDates().start;
  const selWeekEnd=sel.options[sel.selectedIndex]?.textContent?.split('–')[1]?.trim()||'';
  document.getElementById('cons-week-label').textContent=sel.options[sel.selectedIndex]?.textContent||'';
  const body=document.getElementById('cons-body');
  body.innerHTML='<div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>';

  await loadUsers();
  const snap=await getDocs(query(collection(db,'reports'),where('weekStart','==',selWeek)));
  const reps={};
  snap.forEach(d=>{const r=d.data(); reps[r.userId]=r;});

  let html='<h6 class="fw-bold mb-3">Бөглөлтийн байдал</h6>';
  for(const dk of DEPT_ORDER){
    const dus=allUsers.filter(u=>u.department===dk&&u.isActive);
    if(!dus.length) continue;
    html+=`<div class="mb-3"><div class="sec-head">${DEPT_NAMES[dk]}</div><div class="d-flex flex-wrap gap-2">`;
    for(const u of dus){
      const done=!!reps[u.id];
      html+=`<span class="badge ${done?'bg-success':'bg-danger'}">${u.rank} ${u.name} <i class="bi ${done?'bi-check':'bi-clock'}"></i></span>`;
    }
    html+='</div></div>';
  }
  html+='<hr>';

  for(const dk of DEPT_ORDER){
    const dReps=Object.values(reps).filter(r=>r.department===dk);
    if(!dReps.length) continue;
    html+=`<h5 class="mt-4 mb-3" style="color:var(--brand)"><i class="bi bi-building me-2"></i>${DEPT_NAMES[dk]}</h5>`;
    for(const r of dReps){
      const d=r.data||{};
      html+=`<div class="card mb-3"><div class="card-header py-2 d-flex justify-content-between" style="background:#f0f4ff;color:var(--brand)">
        <span class="fw-semibold">${r.rank} ${r.userName}
          <span class="badge ms-1" style="background:var(--brand);font-size:.7rem">${ROLE_LABELS[r.role]||r.role}</span></span>
        <span class="text-muted small">${r.submittedAt||''}</span>
      </div><div class="card-body py-2 px-3 small">`;

      // Role summary
      html+=renderRoleSummary(r.role,d);

      if(d.hiiseh_ajil) html+=`<div class="mt-2"><strong>Хийсэн ажил:</strong><div class="ps-2 text-secondary" style="white-space:pre-wrap">${d.hiiseh_ajil}</div></div>`;
      if(d.hiikh_ajil) html+=`<div class="mt-1"><strong>Хийх ажил:</strong><div class="ps-2 text-secondary" style="white-space:pre-wrap">${d.hiikh_ajil}</div></div>`;
      html+='</div></div>';
    }
  }
  body.innerHTML=html;
}

    h+=badge('Эрх түдгэлз.',d.erh_tudgelj)+badge('Эрх сэргээсэн',d.erh_sergeesen)+badge('Засварласан',d.zasvar_barimt)+badge('Эрэн сурвалж.',d.eren_niit)+badge('Хаяг тогтоосон',d.khayag_togtos);
  } else if(role==='hil'){

  } else if(role==='medee_too'){

    h+=badge('Шинэ баримт',d.shine_barimt)+badge('Хүүхэд нийт',d.tetgleg_huukhed);

async function renderAdmin(){

    for(const[k,v] of Object.entries(ROLE_LABELS)){

  for(const u of allUsers){
    const roleOpts=Object.entries(ROLE_LABELS).map(([k,v])=>`<option value="${k}"${u.role===k?' selected':''}>${v}</option>`).join('');
    html+=`<tr class="${u.isActive?'':'table-light text-muted'}">
      <td>${u.id}</td>
      <td>${u.rank} <strong>${u.name}</strong></td>
      <td><small>${DEPT_NAMES[u.department]||u.department}</small></td>

      <td><button class="btn btn-sm ${u.isActive?'btn-outline-danger':'btn-outline-success'}"
          onclick="toggleUser('${u.id}',${u.isActive})">${u.isActive?'Идэвхгүй болгох':'Идэвхжүүлэх'}</button></td>
      <td><form onsubmit="changeRole(event,'${u.id}')" class="d-flex gap-1">

}
window.toggleUser=async function(uid,cur){
  await updateDoc(doc(db,'users',uid),{isActive:!cur});
  toast(cur?'Идэвхгүй болголоо':'Идэвхжүүллээ'); renderAdmin();
};
window.changeRole=async function(e,uid){
  e.preventDefault();
  const role=new FormData(e.target).get('role');
  await updateDoc(doc(db,'users',uid),{role});
  toast('Үүрэг шинэчлэгдлээ'); renderAdmin();
};
async function adminAddUser(e){
  e.preventDefault();
  const name=document.getElementById('a-name').value.trim();
  const rank=document.getElementById('a-rank').value.trim();
  const dept=document.getElementById('a-dept').value;
  const role=document.getElementById('a-role').value;
  const newId=String(Date.now());

  toast(`✓ ${name} нэмэгдлээ`);
  e.target.reset(); renderAdmin();
}
