<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7 Хоногийн Тайлан — ШШГБ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--brand:#1a3a6b;--brand2:#2563b0}
body{background:#f0f2f5;font-family:'Segoe UI',Arial,sans-serif;font-size:.93rem}
.navbar{background:var(--brand)!important}
.navbar-brand{font-weight:700;letter-spacing:.4px}
.card{border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.card-header{background:var(--brand);color:#fff;border-radius:10px 10px 0 0!important;font-weight:600}
.sec-head{background:#e8edf8;border-left:4px solid var(--brand2);padding:7px 12px;
          border-radius:4px;margin:18px 0 10px;font-weight:600;color:var(--brand)}
.user-card{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:10px 14px;
           cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.user-card:hover{background:#f0f4ff;border-color:var(--brand2)}
.avatar{background:var(--brand);color:#fff;border-radius:50%;width:38px;height:38px;
        display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:.85rem}
input[type=number]{max-width:170px}
.unit{color:#6c757d;font-size:.78rem;margin-left:3px}
.view{display:none}.view.active{display:block}
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:200px}
.tbl-input{width:110px;font-size:.82rem;padding:3px 6px;
           background:#fffde7;border:1.5px solid #aab4c8!important;border-radius:5px}
.tbl-input:focus{background:#fff;border-color:var(--brand2)!important;
                 box-shadow:0 0 0 3px rgba(37,99,176,.15)!important;outline:none}
.form-control[type=number]{background:#f7f9ff;border:1.5px solid #aab4c8;border-radius:6px}
.form-control[type=number]:focus{background:#fff;border-color:var(--brand2);
                                  box-shadow:0 0 0 3px rgba(37,99,176,.15)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5}
.login-card{width:100%;max-width:400px;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.13)}
.login-header{background:var(--brand);color:#fff;border-radius:14px 14px 0 0;padding:28px 24px 20px;text-align:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-journal-text" style="font-size:2rem"></i>
      <h5 class="mt-2 mb-0 fw-bold">7 Хоногийн Тайлан</h5>
      <div style="font-size:.8rem;opacity:.8">Шийдвэр гүйцэтгэх алба</div>
    </div>
    <div class="p-4">
      <form onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label fw-semibold">Нэр сонгох</label>
          <select class="form-select" id="login-user" required>
            <option value="">-- Нэрээ сонгоно уу --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Нууц үг</label>
          <input type="password" class="form-control" id="login-pass" required placeholder="Нууц үгээ оруулна уу">
        </div>
        <div id="login-err" class="text-danger small mb-2" style="display:none">Нэр эсвэл нууц үг буруу байна.</div>
        <button type="submit" class="btn w-100 py-2 fw-semibold" style="background:var(--brand);color:#fff" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх
        </button>
      </form>
      <hr>
      <button class="btn btn-outline-secondary btn-sm w-100" onclick="showAdminLogin()">
        <i class="bi bi-shield-lock me-1"></i>Admin нэвтрэх
      </button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal fade" id="adminLoginModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--brand);color:#fff">
        <h6 class="modal-title"><i class="bi bi-shield-lock me-2"></i>Admin нэвтрэх</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form onsubmit="doAdminLogin(event)">
          <div class="mb-3">
            <label class="form-label fw-semibold">Admin нууц үг</label>
            <input type="password" class="form-control" id="admin-pass-input" placeholder="Нууц үг">
          </div>
          <div id="admin-login-err" class="text-danger small mb-2" style="display:none">Нууц үг буруу.</div>
          <button type="submit" class="btn w-100" style="background:var(--brand);color:#fff">Нэвтрэх</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
<nav class="navbar navbar-dark navbar-expand-lg mb-3">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-journal-text me-2"></i>7 Хоногийн Тайлан</span>
    <div class="d-flex gap-2 ms-auto flex-wrap align-items-center">
      <span class="text-white-50 small" id="nav-username"></span>
      <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-house me-1"></i>Нүүр</button>
      <button class="btn btn-sm btn-outline-light d-none" id="nav-consolidated-btn" onclick="showView('consolidated')"><i class="bi bi-bar-chart me-1"></i>Нэгтгэл</button>
      <button class="btn btn-sm btn-outline-light d-none" id="nav-admin-btn" onclick="showView('admin')"><i class="bi bi-gear me-1"></i>Admin</button>
      <button class="btn btn-sm btn-outline-warning" onclick="doLogout()"><i class="bi bi-box-arrow-right me-1"></i>Гарах</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-3">
<div id="toast-wrap" style="position:fixed;top:70px;right:16px;z-index:9999"></div>

<!-- HOME -->
<div id="view-home" class="view">
  <div class="row justify-content-center">
   <div class="col-lg-10">
    <div class="card mb-4">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-calendar-week me-2"></i><span id="home-week-label">...</span></span>
      <div class="d-flex gap-2 align-items-center">
       <span class="badge bg-light text-dark" id="home-week-dates"></span>
       <button class="btn btn-sm btn-outline-light" onclick="refreshHome()" title="Шинэчлэх"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
     </div>
     <div class="card-body" id="home-users-list">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- REPORT -->
<div id="view-report" class="view">
  <div class="row justify-content-center">
   <div class="col-lg-9">
    <div class="card">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span id="report-title">Тайлан</span>
      <div class="d-flex gap-2 align-items-center">
       <span class="text-white-50 small" id="report-week-label"></span>
       <button class="btn btn-sm btn-outline-light" onclick="refreshReport()" title="Шинэчлэх"><i class="bi bi-arrow-clockwise"></i></button>
       <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-arrow-left"></i></button>
      </div>
     </div>
     <div class="card-body">
      <div id="report-behalf-info"></div>
      <div id="report-submitted-info"></div>
      <form id="report-form" onsubmit="submitReport(event)">
       <div id="report-fields"></div>
       <div class="sec-head mt-4"><i class="bi bi-list-check me-1"></i>Ерөнхий тайлан</div>
       <div class="row g-3">
        <div class="col-12">
         <label class="form-label fw-semibold">Энэ 7 хоногт хийсэн ажил</label>
         <textarea class="form-control" id="f-hiiseh" name="hiiseh_ajil" rows="5" placeholder="Хийсэн ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Дараа 7 хоногт хийх ажил</label>
         <textarea class="form-control" id="f-hiikh" name="hiikh_ajil" rows="4" placeholder="Хийх ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Тэмдэглэл / санал</label>
         <textarea class="form-control" id="f-temdeg" name="temdegleltar" rows="2" placeholder="Нэмэлт тэмдэглэл..."></textarea>
        </div>
       </div>
       <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn px-4" style="background:var(--brand);color:#fff" id="submit-btn">
         <i class="bi bi-floppy me-1"></i>Хадгалах
        </button>
        <button type="button" class="btn btn-outline-secondary" onclick="showView('home')">Буцах</button>
       </div>
      </form>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- CONSOLIDATED -->
<div id="view-consolidated" class="view">
  <div class="row">
   <div class="col-12">
    <div class="card mb-3">
     <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span><i class="bi bi-bar-chart me-2"></i>Нэгтгэсэн тайлан — <span id="cons-week-label"></span></span>
      <div class="d-flex gap-2 align-items-center">
       <select class="form-select form-select-sm" id="week-selector" onchange="loadConsolidated()" style="width:auto"></select>
       <button class="btn btn-sm btn-outline-light" onclick="window.print()"><i class="bi bi-printer me-1"></i>Хэвлэх</button>
      </div>
     </div>
     <div class="card-body" id="cons-body">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="view">
  <div class="row"><div class="col-lg-10 mx-auto">
   <div class="card mb-4">
    <div class="card-header"><i class="bi bi-person-plus me-2"></i>Алба хаагч нэмэх</div>
    <div class="card-body">
     <form onsubmit="adminAddUser(event)" class="row g-3 align-items-end">
      <div class="col-md-2"><label class="form-label">Цол</label>
       <input type="text" id="a-rank" class="form-control" placeholder="д/х"></div>
      <div class="col-md-2"><label class="form-label">Нэр *</label>
       <input type="text" id="a-name" class="form-control" required placeholder="О.Нэр"></div>
      <div class="col-md-2"><label class="form-label">Хэлтэс *</label>
       <select id="a-dept" class="form-select" required>
        <option value="dotood_khyanalt">Дотоод хяналтын хэлтэс</option>
        <option value="tsakhim_burtgel">Цахим бүртгэл, дүн шинжилгээний хэлтэс</option>
        <option value="tolovlolt">Төлөвлөлт, дотоод ажлын хэлтэс</option>
       </select></div>
      <div class="col-md-2"><label class="form-label">Үүрэг *</label>
       <select id="a-role" class="form-select" required></select></div>
      <div class="col-md-2"><label class="form-label">Нууц үг</label>
       <input type="text" id="a-pass" class="form-control" placeholder="1234 (анхны)"></div>
      <div class="col-md-2">
       <label class="form-label">&nbsp;</label>
       <button type="submit" class="btn w-100 d-block" style="background:var(--brand);color:#fff"><i class="bi bi-plus-lg"></i> Нэмэх</button>
      </div>
     </form>
     <hr>
     <div class="row g-2 align-items-end">
      <div class="col-md-4"><label class="form-label fw-semibold">Admin нууц үг солих</label>
       <form onsubmit="changeAdminPass(event)" class="d-flex gap-2">
        <input type="password" id="new-admin-pass" class="form-control" placeholder="Шинэ нууц үг" required>
        <button type="submit" class="btn btn-outline-danger">Солих</button>
       </form>
      </div>
     </div>
    </div>
   </div>
   <div class="card">
    <div class="card-header"><i class="bi bi-people me-2"></i>Алба хаагчдын жагсаалт</div>
    <div class="card-body p-0">
     <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
       <thead><tr><th>#</th><th>Нэр</th><th>Хэлтэс</th><th>Үүрэг</th><th>Байдал</th><th>Цол / Нэр засах</th><th>Үүрэг солих</th><th>Нууц үг / Байдал</th></tr></thead>
       <tbody id="admin-users-table"></tbody>
      </table>
     </div>
    </div>
   </div>
  </div></div>
</div>

</div><!-- /container -->
</div><!-- /main-app -->

function weekDates(offset=0){
  const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1 + offset*7);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate()+6);
  const fmt = x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {start:fmt(mon), end:fmt(sun)};
}
function fmtWeek(start,end){
  return `${start.replace(/-/g,'.')} – ${end.slice(5).replace('-','.')}`;
}
function toast(msg,ok=true){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className=`alert alert-${ok?'success':'danger'} py-2 px-3 shadow`;
  el.style.cssText='min-width:260px;font-size:.9rem';
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function catKey(cat){return cat.replace(/[\s,]/g,'_').toLowerCase();}

function computeMedeeSums(){
  function v(nm){var el=document.querySelector('[name="'+nm+'"]');return el?(parseFloat(el.value)||0):0;}
  var p='tbl_нэгдсэн_мэдээ__';
  var biToo=v(p+'bieluu_too'),biDun=v(p+'bieluu_dun');
  var boToo=v(p+'bodit_too'),boDun=v(p+'bodit_dun');
  var ulToo=v(p+'uldegdel_too'),ulDun=v(p+'uldegdel_dun');
  function fmt(n){return n?n.toLocaleString('mn-MN'):'—';}
  function fmtD(n){
    if(!n)return '—';
    if(n>=1e12)return (n/1e12).toFixed(1)+' их наяд';
    if(n>=1e9)return (n/1e9).toFixed(1)+' тэрбум';
    if(n>=1e6)return (n/1e6).toFixed(1)+' сая';
    return n.toLocaleString();
  }
  function set(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
  set('ms-bi-too',fmt(biToo)); set('ms-bi-dun',fmtD(biDun));
  set('ms-bo-too',fmt(boToo)); set('ms-bo-dun',fmtD(boDun));
  set('ms-ul-too',fmt(ulToo)); set('ms-ul-dun',fmtD(ulDun));
}

function computeLavSums(){
  // Query inputs by name to avoid row-index fragility
  function v(nm){var el=document.querySelector('[name="'+nm+'"]');return el?(parseFloat(el.value)||0):0;}
  var cols=['irgen','huuliin_etgeed'];
  function rowSum(cat){return cols.reduce(function(s,col){return s+v('tbl_'+cat+'__'+col);},0);}
  var r0=rowSum('нэг_цэг');
  var r1=rowSum('орон_нутаг');
  var r2=rowSum('арилжааны_банк');
  var r3=rowSum('төрийн_эрх_бүхий_байгуулла');
  var r4=rowSum('хүсэлт');
  var c1=r0+r1+r3+r4;
  var c2=r2;
  var c3=c1+c2;
  var e1=document.getElementById('lav-c1');
  var e2=document.getElementById('lav-c2');
  var e3=document.getElementById('lav-c3');
  if(e1) e1.textContent=c1+' ш';
  if(e2) e2.textContent=c2+' ш';
  if(e3) e3.textContent=c3+' ш';
}

async function populateLoginSelect(){
  const sel=document.getElementById('login-user');
  sel.innerHTML='<option value="">-- Нэрээ сонгоно уу --</option>';
  await loadUsers();
  for(const u of allUsers.filter(u=>u.isActive)){
    const opt=document.createElement('option');
    opt.value=u.id; opt.textContent=`${u.rank} ${u.name}`;
    sel.appendChild(opt);
  }
}

async function doLogin(e){
  e.preventDefault();
  const uid=document.getElementById('login-user').value;
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Шалгаж байна...';
  try{
    const u=allUsers.find(x=>x.id===uid);
    if(!u){ err.style.display='block'; btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх'; return; }
    const storedPass = u.password || '1234';
    if(pass !== storedPass){
      err.style.display='block';
      btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх'; return;
    }
    loggedInUser=u; isAdmin=false;
    enterApp();
  }catch(ex){ toast('Алдаа: '+ex.message,false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх';
}

async function doAdminLogin(e){
  e.preventDefault();
  const pass=document.getElementById('admin-pass-input').value;
  const err=document.getElementById('admin-login-err');
  err.style.display='none';
  // Check admin password from Firestore settings
  const settingsDoc=await getDoc(doc(db,'settings','admin'));
  const adminPass=settingsDoc.exists()?settingsDoc.data().password:ADMIN_DEFAULT_PASS;
  if(pass!==adminPass){ err.style.display='block'; return; }
  isAdmin=true; loggedInUser={id:'admin',name:'Admin',rank:'',role:'admin'};
  bootstrap.Modal.getInstance(document.getElementById('adminLoginModal'))?.hide();
  enterApp();
}

async function enterApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('nav-username').textContent=loggedInUser.rank+' '+loggedInUser.name;
  if(isAdmin) document.getElementById('nav-admin-btn').classList.remove('d-none');
  else document.getElementById('nav-admin-btn').classList.add('d-none');
  // Нэгтгэл товч: зөвхөн admin болон хэлтсийн дарга харна
  const canSeeNegtle = isAdmin || loggedInUser.role==='head';
  document.getElementById('nav-consolidated-btn').classList.toggle('d-none', !canSeeNegtle);
  if(isAdmin){ showView('admin'); return; }
  if(!currentWeek){ currentWeek=weekDates(); }
  currentUser=loggedInUser;
  if(loggedInUser.role==='head'){ showView('home'); return; }
  await loadWeekReports(currentWeek.start);
  renderReportForm();
  showView('report');
}

function doLogout(){
  loggedInUser=null; isAdmin=false; currentUser=null;
  document.getElementById('login-page').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function showView(name){
  // Нэгтгэл: зөвхөн admin эсвэл дарга
  if(name==='consolidated' && !isAdmin && loggedInUser?.role!=='head') return;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='home') renderHome();
  if(name==='consolidated') loadConsolidated();
  if(name==='admin') renderAdmin();
}

// ── Seed users ─────────────────────────────────────────
async function seedUsers(){
  const snap = await getDocs(collection(db,'users'));
  if(snap.size>0) return;
  for(let i=0;i<INIT_USERS.length;i++){
    const u=INIT_USERS[i];
    await setDoc(doc(db,'users',String(i+1)),{...u,isActive:true,password:'1234',createdAt:serverTimestamp()});
  }
  // Set default admin password
  await setDoc(doc(db,'settings','admin'),{password:ADMIN_DEFAULT_PASS});
}

// ── Load users ─────────────────────────────────────────
async function loadUsers(force=false){
  if(!force && allUsers.length>0) return allUsers;
  const snap=await getDocs(query(collection(db,'users'),orderBy('__name__')));
  allUsers=[];
  snap.forEach(d=>allUsers.push({id:d.id,...d.data()}));
  return allUsers;
}

// ── Current week reports ───────────────────────────────
async function loadWeekReports(weekStart){
  const snap=await getDocs(query(collection(db,'reports'),where('weekStart','==',weekStart)));
  allReports={};
  snap.forEach(d=>{const r=d.data(); allReports[r.userId]=r;});
}

          } else if(f.ta){
            html+=`<div class="col-12"><label class="form-label fw-semibold">${f.l}</label>
              <textarea class="form-control" name="${f.id}" rows="2">${d[f.id]||''}</textarea></div>`;
          } else {
            html+=`<div class="col-md-6 col-lg-4">
              <label class="form-label fw-semibold">${f.l}${f.u?`<span class="unit">(${f.u})</span>`:''}</label>
              <input type="number" class="form-control" name="${f.id}" step="${f.s||'1'}" min="0" value="${d[f.id]||''}">
            </div>`;
          }
        }
        html+='</div>';
      }
    }
  }
  document.getElementById('report-fields').innerHTML=html;
  if(u.role==='lavlagaa_negtle'){
    computeLavSums();
    const lavTbl=document.getElementById('lav-table');
    if(lavTbl) lavTbl.addEventListener('input', computeLavSums);
  }
  if(u.role==='medee_too'){
    computeMedeeSums();
    document.getElementById('report-fields').addEventListener('input',function(e){
      if(e.target.matches('input')) computeMedeeSums();
    });
  }

  // Fill general fields
  document.getElementById('f-hiiseh').value=d.hiiseh_ajil||'';
  document.getElementById('f-hiikh').value=d.hiikh_ajil||'';
  document.getElementById('f-temdeg').value=d.temdegleltar||'';
}

// ── Submit report ───────────────────────────────────────
async function submitReport(e){
  e.preventDefault();
  if(!currentUser||!currentWeek) return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Хадгалж байна...';
  try{
    const fd=new FormData(document.getElementById('report-form'));
    const data={};
    fd.forEach((v,k)=>{if(v.trim()) data[k]=v.trim();});
    // Collect negj dropdown rows
    document.querySelectorAll('[id^="negj_"]').forEach(wrap=>{
      const fid=wrap.id.replace(/^negj_/,'');
      const rows=[];
      wrap.querySelectorAll('.negj-row').forEach(row=>{
        const n=row.querySelector('.negj-sel').value;
        const t=row.querySelector('.negj-num').value;
        if(n||t) rows.push({n,t:parseInt(t)||0});
      });
      if(rows.length) data[fid]=JSON.stringify(rows);
    });
    const reportId=`${currentWeek.start}_${currentUser.id}`;
    await setDoc(doc(db,'reports',reportId),{
      userId:currentUser.id, userName:currentUser.name, rank:currentUser.rank,
      department:currentUser.department, role:currentUser.role,
      weekStart:currentWeek.start, weekEnd:currentWeek.end,
      data, submittedAt:new Date().toLocaleString('mn-MN'), updatedAt:serverTimestamp()
    });
    allReports[currentUser.id]={userId:currentUser.id,data,submittedAt:new Date().toLocaleString('mn-MN')};
    toast('✓ Тайлан хадгалагдлаа');
    const filledOnBehalf=loggedInUser&&loggedInUser.id!==currentUser.id;
    if(filledOnBehalf){ showView('home'); } else { renderReportForm(); }
  } catch(err){ toast('Алдаа гарлаа: '+err.message, false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-floppy me-1"></i>Хадгалах';
}

// ── Consolidated ────────────────────────────────────────────
async function loadConsolidated(){
  const sel=document.getElementById('week-selector');
  if(!sel.options.length){
    for(let i=0;i>=-19;i--){
      const w=weekDates(i);
      const opt=document.createElement('option');
      opt.value=w.start; opt.textContent=fmtWeek(w.start,w.end);
      if(i===0) opt.selected=true;
      sel.appendChild(opt);
    }
  }
  const selWeek=sel.value||weekDates().start;
  document.getElementById('cons-week-label').textContent=sel.options[sel.selectedIndex]?.textContent||'';
  const body=document.getElementById('cons-body');
  body.innerHTML='<div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>';

  await loadUsers();
  const snap=await getDocs(query(collection(db,'reports'),where('weekStart','==',selWeek)));
  const reps={};
  snap.forEach(d=>{const r=d.data(); reps[r.userId]=r;});

  const headDept=(loggedInUser&&loggedInUser.role==='head')?loggedInUser.department:null;
  const visibleDepts=headDept?[headDept]:DEPT_ORDER;

  // ── Submission status badges ──────────────────────────────
  let html='<h6 class="fw-bold mb-2">Бөглөлтийн байдал</h6>';
  for(const dk of visibleDepts){
    const dus=allUsers.filter(u=>u.department===dk&&u.isActive);
    if(!dus.length) continue;
    const dSub=dus.filter(u=>!!reps[u.id]).length;
    html+=`<div class="mb-2"><span class="fw-semibold" style="font-size:.85rem">${DEPT_NAMES[dk]}:</span>
      <span class="ms-2 badge bg-success">${dSub} илгээсэн</span>
      <span class="ms-1 badge bg-danger">${dus.length-dSub} хүлээгдэж байна</span>
      <span class="ms-2" style="font-size:.8rem">`;
    for(const u of dus){
      const done=!!reps[u.id];
      html+=`<span class="badge ${done?'bg-success':'bg-danger'} me-1">${u.rank} ${u.name}</span>`;
    }
    html+=`</span></div>`;
  }
  html+='<hr class="my-3">';

  if(!Object.keys(reps).length){
    html+='<div class="alert alert-info">Энэ 7 хоногт тайлан байхгүй байна.</div>';
    body.innerHTML=html; return;
  }

  // ── Aggregated report per department ─────────────────────
  for(const dk of visibleDepts){
    const dUsers=allUsers.filter(u=>u.department===dk&&u.isActive);
    const dReps=dUsers.map(u=>reps[u.id]).filter(Boolean);
    if(!dReps.length) continue;

    html+=`<h5 class="mt-4 mb-3 fw-bold" style="color:var(--brand);border-bottom:2px solid var(--brand);padding-bottom:6px">
      <i class="bi bi-building me-2"></i>${DEPT_NAMES[dk]}
    </h5>`;

    // Group submitted reports by role
    const roleMap={};
    for(const r of dReps){
      if(!roleMap[r.role]) roleMap[r.role]=[];
      roleMap[r.role].push(r);
    }

    for(const [role, roleReps] of Object.entries(roleMap)){
      const secs=ROLE_FORMS[role]||[];
      const names=roleReps.map(r=>`${r.rank||''} ${r.userName||''}`).join(', ');

      html+=`<div class="card mb-3">
        <div class="card-header py-2 d-flex justify-content-between align-items-center" style="background:#f0f4ff;color:var(--brand)">
          <span class="fw-semibold">${ROLE_LABELS[role]||role}</span>
          <span class="text-muted" style="font-size:.8rem">${names}</span>
        </div><div class="card-body pb-2">`;

      // Numeric / table sections: aggregate across same-role members
      for(const sec of secs){
        if(sec.table){
          html+=`<div class="sec-head">${sec.t}</div>
            <div class="table-responsive mb-2"><table class="table table-sm table-bordered">
            <thead><tr><th>Ангилал</th>${sec.cols.map(c=>`<th class="text-center">${c.l}${c.stack?'':('<br><small class="text-muted">'+c.u+'</small>')}</th>`).join('')}</tr></thead><tbody>`;
          for(const cat of sec.cats){
            const ck='tbl_'+catKey(cat)+'__';
            html+=`<tr><td class="fw-semibold small">${cat}</td>`;
            for(const col of sec.cols){
              if(col.stack){
                html+=`<td>`;
                for(const sub of col.stack){
                  const fid=ck+sub.id;
                  let total=0;
                  for(const r of roleReps) total+=(parseFloat((r.data||{})[fid])||0);
                  html+=`<div class="text-center fw-semibold">${sub.l?`<small class="d-block text-muted" style="font-size:.7rem">${sub.l}</small>`:''}${total?total.toLocaleString():'—'} <small class="text-muted">${sub.u}</small></div>`;
                }
                html+=`</td>`;
              } else {
              const fid=ck+col.id;
              let total=0;
              for(const r of roleReps) total+=(parseFloat((r.data||{})[fid])||0);
              html+=`<td class="text-center fw-semibold">${total?total.toLocaleString():'—'}</td>`;
              }
            }
            html+=`</tr>`;
          }
          html+=`</tbody></table></div>`;
          if(sec.lav_computed){
            const getT=(cat,col)=>{const fid='tbl_'+catKey(cat)+'__'+col;return roleReps.reduce((s,r)=>s+(parseFloat((r.data||{})[fid])||0),0);};
            const nonBank=['Нэг цэг','Орон нутаг','Төрийн эрх бүхий байгууллага','Хүсэлт'];
            const c1=nonBank.reduce((s,c)=>s+getT(c,'irgen')+getT(c,'huuliin_etgeed'),0);
            const c2=getT('Арилжааны банк','irgen')+getT('Арилжааны банк','huuliin_etgeed');
            const c3=c1+c2;
            html+=`<div class="row g-2 mb-2">
              <div class="col-4"><div class="text-muted" style="font-size:.73rem">Шүүхийн шийдвэрийн тодорхойлолт, лавлагаа олгосон</div><div class="fw-bold">${c1||'—'} ш</div></div>
              <div class="col-4"><div class="text-muted" style="font-size:.73rem">Арилжааны банкаар тулгаж хүргүүлсэн</div><div class="fw-bold">${c2||'—'} ш</div></div>
              <div class="col-4"><div class="text-muted" style="font-size:.73rem">Нийт олгосон лавлагааны тоо</div><div class="fw-bold fs-6">${c3||'—'} ш</div></div>
            </div>`;
          }
        } else {
          const numFields=sec.f.filter(f=>!f.ta&&!f.negj);
          const txtFields=sec.f.filter(f=>f.ta);
          const negFields=sec.f.filter(f=>f.negj);
          if(numFields.length){
            html+=`<div class="sec-head">${sec.t}</div><div class="row g-2 mb-2">`;
            for(const f of numFields){
              let total=0; let hasAny=false;
              for(const r of roleReps){
                const v=(r.data||{})[f.id];
                if(v!==undefined&&v!==''){total+=parseFloat(v)||0;hasAny=true;}
              }
              html+=`<div class="col-6 col-md-4 col-lg-3">
                <div class="text-muted" style="font-size:.75rem">${f.l}</div>
                <div class="fw-bold fs-6">${hasAny?total.toLocaleString():'—'} <span class="unit">${f.u}</span></div>
              </div>`;
            }
            html+=`</div>`;
          }
          if(txtFields.length){
            for(const f of txtFields){
              const vals=roleReps.map(r=>{
                const v=(r.data||{})[f.id];
                return v?{name:`${r.rank||''} ${r.userName||''}`,text:v}:null;
              }).filter(Boolean);
              if(vals.length){
                html+=`<div class="mb-2"><div class="fw-semibold small text-muted mb-1">${f.l}:</div>`;
                for(const v of vals) html+=`<div class="ms-2 small mb-1"><strong>${v.name}:</strong> ${v.text}</div>`;
                html+=`</div>`;
              }
            }
          }
          if(negFields.length){
            for(const f of negFields){
              const totals={};
              for(const r of roleReps){
                let rows=[];
                try{if((r.data||{})[f.id]) rows=JSON.parse((r.data||{})[f.id]);}catch(e){}
                for(const row of rows){if(row.n) totals[row.n]=(totals[row.n]||0)+(parseInt(row.t)||0);}
              }
              const entries=Object.entries(totals);
              if(entries.length){
                html+=`<div class="mb-2"><div class="fw-semibold small text-muted mb-1">${f.l}:</div>`;
                for(const [negj,tot] of entries)
                  html+=`<div class="ms-2 small mb-1">• <strong>${negj}:</strong> ${tot.toLocaleString()} ш</div>`;
                html+=`</div>`;
              }
            }
          }
        }
      }

      // General report (хийсэн/хийх ажил)
      const hasGeneral=roleReps.some(r=>{const d=r.data||{};return d.hiiseh_ajil||d.hiikh_ajil;});
      if(hasGeneral){
        html+=`<div class="sec-head">Ерөнхий тайлан</div>`;
        for(const r of roleReps){
          const d=r.data||{};
          if(!d.hiiseh_ajil&&!d.hiikh_ajil) continue;
          html+=`<div class="mb-2 p-2 rounded" style="background:#f8f9fa">
            <div class="fw-semibold small mb-1">${r.rank||''} ${r.userName||''}:</div>`;
          if(d.hiiseh_ajil) html+=`<div class="small"><span class="text-muted">Хийсэн:</span> ${d.hiiseh_ajil}</div>`;
          if(d.hiikh_ajil) html+=`<div class="small"><span class="text-muted">Хийх:</span> ${d.hiikh_ajil}</div>`;
          if(d.temdegleltar) html+=`<div class="small"><span class="text-muted">Тэмдэглэл:</span> ${d.temdegleltar}</div>`;
          html+=`</div>`;
        }
      }

      html+=`</div></div>`;
    }

    // People with no role form (head, general roles)
    const noFormReps=dReps.filter(r=>(!ROLE_FORMS[r.role]||!ROLE_FORMS[r.role].length));
    for(const r of noFormReps){
      const d=r.data||{};
      if(!d.hiiseh_ajil&&!d.hiikh_ajil) continue;
      html+=`<div class="card mb-2"><div class="card-body py-2">
        <div class="fw-semibold">${r.rank||''} ${r.userName||''} <span class="badge ms-1" style="background:var(--brand);font-size:.7rem">${ROLE_LABELS[r.role]||r.role}</span></div>`;
      if(d.hiiseh_ajil) html+=`<div class="small mt-1"><span class="text-muted">Хийсэн:</span> ${d.hiiseh_ajil}</div>`;
      if(d.hiikh_ajil) html+=`<div class="small"><span class="text-muted">Хийх:</span> ${d.hiikh_ajil}</div>`;
      if(d.temdegleltar) html+=`<div class="small"><span class="text-muted">Тэмдэглэл:</span> ${d.temdegleltar}</div>`;
      html+=`</div></div>`;
    }
  }

  body.innerHTML=html;
}


// ── Admin ──────────────────────────────────────────────
async function renderAdmin(){
  await loadUsers(true);
  const roleSelect=document.getElementById('a-role');
  if(!roleSelect.options.length){
    for(const [k,v] of Object.entries(ROLE_LABELS)){
      const o=document.createElement('option'); o.value=k; o.textContent=v; roleSelect.appendChild(o);
    }
  }
  let html='';
  for(const u of allUsers){
    html+=`<tr>
      <td>${u.id}</td>
      <td>${u.rank||''} ${u.name}</td>
      <td style="font-size:.8rem">${DEPT_NAMES[u.department]||u.department}</td>
      <td style="font-size:.8rem">${ROLE_LABELS[u.role]||u.role}</td>
      <td>${u.isActive!==false?'<span class="badge bg-success">Идэвхтэй</span>':'<span class="badge bg-secondary">Идэвхгүй</span>'}</td>
      <td>
        <div class="d-flex flex-column gap-1">
          <div class="d-flex gap-1">
            <input type="text" class="form-control form-control-sm" id="rank-${u.id}" value="${u.rank||''}" style="width:50px;font-size:.8rem" placeholder="цол">
            <input type="text" class="form-control form-control-sm" id="name-${u.id}" value="${u.name||''}" style="width:90px;font-size:.8rem" placeholder="нэр">
            <button class="btn btn-sm btn-outline-secondary" onclick="changeRankName('${u.id}')"><i class="bi bi-check-lg"></i></button>
          </div>
        </div>
      </td>
      <td>
        <select class="form-select form-select-sm" style="width:auto;font-size:.8rem" onchange="changeRole('${u.id}',this.value)">
          ${Object.entries(ROLE_LABELS).map(([k,v])=>`<option value="${k}"${u.role===k?' selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td>
        <div class="d-flex gap-1 align-items-center">
          <input type="text" class="form-control form-control-sm" id="pass-${u.id}" placeholder="${u.password||'1234'}" style="width:70px;font-size:.8rem">
          <button class="btn btn-sm btn-outline-primary" onclick="changePass('${u.id}')">Нууц үг</button>
          <button class="btn btn-sm ${u.isActive!==false?'btn-outline-danger':'btn-outline-success'}" onclick="toggleActive('${u.id}',${u.isActive===false})">
            ${u.isActive!==false?'Хаах':'Нээх'}
          </button>
        </div>
      </td>
    </tr>`;
  }
  document.getElementById('admin-users-table').innerHTML=html;
}

async function refreshReport(){
  if(!currentWeek) return;
  await loadWeekReports(currentWeek.start);
  renderReportForm();
  toast('Шинэчлэгдлээ ✓');
}
async function changeRankName(uid){
  const rank=document.getElementById('rank-'+uid).value.trim();
  const name=document.getElementById('name-'+uid).value.trim();
  if(!name){toast('Нэр хоосон байна',false);return;}
  await updateDoc(doc(db,'users',uid),{rank,name});
  const u=allUsers.find(x=>x.id===uid); if(u){u.rank=rank;u.name=name;}
  toast('Цол/Нэр засагдлаа ✓');
  renderAdmin(); populateLoginSelect();
}
async function changeRole(uid,newRole){
  await updateDoc(doc(db,'users',uid),{role:newRole});
  const u=allUsers.find(x=>x.id===uid); if(u) u.role=newRole;
  toast('Үүрэг өөрчлөгдлөө ✓');
}
async function changePass(uid){
  const inp=document.getElementById('pass-'+uid);
  const np=inp.value.trim(); if(!np){toast('Нууц үг хоосон',false);return;}
  await updateDoc(doc(db,'users',uid),{password:np});
  const u=allUsers.find(x=>x.id===uid); if(u) u.password=np;
  inp.value=''; inp.placeholder=np;
  toast('Нууц үг солигдлоо ✓');
}
async function toggleActive(uid,active){
  await updateDoc(doc(db,'users',uid),{isActive:active});
  const u=allUsers.find(x=>x.id===uid); if(u) u.isActive=active;
  renderAdmin(); populateLoginSelect();
  toast(active?'Идэвхжүүллээ ✓':'Хаалаа ✓');
}
async function changeAdminPass(e){
  e.preventDefault();
  const inp=document.getElementById('new-admin-pass');
  const np=inp.value.trim(); if(!np) return;
  await setDoc(doc(db,'settings','admin'),{password:np});
  inp.value=''; toast('Admin нууц үг солигдлоо ✓');
}
async function adminAddUser(e){
  e.preventDefault();
  const rank=document.getElementById('a-rank').value.trim();
  const name=document.getElementById('a-name').value.trim();
  const dept=document.getElementById('a-dept').value;
  const role=document.getElementById('a-role').value;
  const pass=document.getElementById('a-pass').value.trim()||'1234';
  if(!name){toast('Нэр оруулна уу',false);return;}
  await loadUsers(true);
  const newId=String(Math.max(0,...allUsers.map(u=>Number(u.id)||0))+1);
  await setDoc(doc(db,'users',newId),{name,rank,department:dept,role,isActive:true,password:pass,createdAt:serverTimestamp()});
  ['a-rank','a-name','a-pass'].forEach(id=>{document.getElementById(id).value='';});
  toast(`${rank} ${name} нэмэгдлээ ✓`);
  await loadUsers(true); renderAdmin(); populateLoginSelect();
}

// ── Startup ─────────────────────────────────────────────
seedUsers().then(()=>populateLoginSelect());
</script>
