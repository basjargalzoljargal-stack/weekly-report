<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7 Хоногийн Тайлан — ШШГБ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--brand:#1a3a6b;--brand2:#2563b0}
body{background:#f0f2f5;font-family:'Segoe UI',Arial,sans-serif;font-size:.93rem}
.navbar{background:var(--brand)!important}
.navbar-brand{font-weight:700;letter-spacing:.4px}
.card{border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.card-header{background:var(--brand);color:#fff;border-radius:10px 10px 0 0!important;font-weight:600}
.sec-head{background:#e8edf8;border-left:4px solid var(--brand2);padding:7px 12px;
          border-radius:4px;margin:18px 0 10px;font-weight:600;color:var(--brand)}
.user-card{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:10px 14px;
           cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.user-card:hover{background:#f0f4ff;border-color:var(--brand2)}
.avatar{background:var(--brand);color:#fff;border-radius:50%;width:38px;height:38px;
        display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:.85rem}
input[type=number]{max-width:170px}
.unit{color:#6c757d;font-size:.78rem;margin-left:3px}
.view{display:none}.view.active{display:block}
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:200px}
.tbl-input{width:110px;font-size:.82rem;padding:3px 6px;
           background:#fffde7;border:1.5px solid #aab4c8!important;border-radius:5px}
.tbl-input:focus{background:#fff;border-color:var(--brand2)!important;
                 box-shadow:0 0 0 3px rgba(37,99,176,.15)!important;outline:none}
.form-control[type=number]{background:#f7f9ff;border:1.5px solid #aab4c8;border-radius:6px}
.form-control[type=number]:focus{background:#fff;border-color:var(--brand2);
                                  box-shadow:0 0 0 3px rgba(37,99,176,.15)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5}
.login-card{width:100%;max-width:400px;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.13)}
.login-header{background:var(--brand);color:#fff;border-radius:14px 14px 0 0;padding:28px 24px 20px;text-align:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-journal-text" style="font-size:2rem"></i>
      <h5 class="mt-2 mb-0 fw-bold">7 Хоногийн Тайлан</h5>
      <div style="font-size:.8rem;opacity:.8">Шийдвэр гүйцэтгэх алба</div>
    </div>
    <div class="p-4">
      <form onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label fw-semibold">Нэр сонгох</label>
          <select class="form-select" id="login-user" required>
            <option value="">-- Нэрээ сонгоно уу --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Нууц үг</label>
          <input type="password" class="form-control" id="login-pass" required placeholder="Нууц үгээ оруулна уу">
        </div>
        <div id="login-err" class="text-danger small mb-2" style="display:none">Нэр эсвэл нууц үг буруу байна.</div>
        <button type="submit" class="btn w-100 py-2 fw-semibold" style="background:var(--brand);color:#fff" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх
        </button>
      </form>
      <hr>
      <button class="btn btn-outline-secondary btn-sm w-100" onclick="showAdminLogin()">
        <i class="bi bi-shield-lock me-1"></i>Admin нэвтрэх
      </button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal fade" id="adminLoginModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--brand);color:#fff">
        <h6 class="modal-title"><i class="bi bi-shield-lock me-2"></i>Admin нэвтрэх</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form onsubmit="doAdminLogin(event)">
          <div class="mb-3">
            <label class="form-label fw-semibold">Admin нууц үг</label>
            <input type="password" class="form-control" id="admin-pass-input" placeholder="Нууц үг">
          </div>
          <div id="admin-login-err" class="text-danger small mb-2" style="display:none">Нууц үг буруу.</div>
          <button type="submit" class="btn w-100" style="background:var(--brand);color:#fff">Нэвтрэх</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
<nav class="navbar navbar-dark navbar-expand-lg mb-3">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-journal-text me-2"></i>7 Хоногийн Тайлан</span>
    <div class="d-flex gap-2 ms-auto flex-wrap align-items-center">
      <span class="text-white-50 small" id="nav-username"></span>
      <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-house me-1"></i>Нүүр</button>
      <button class="btn btn-sm btn-outline-light d-none" id="nav-consolidated-btn" onclick="showView('consolidated')"><i class="bi bi-bar-chart me-1"></i>Нэгтгэл</button>
      <button class="btn btn-sm btn-outline-light d-none" id="nav-admin-btn" onclick="showView('admin')"><i class="bi bi-gear me-1"></i>Admin</button>
      <button class="btn btn-sm btn-outline-warning" onclick="doLogout()"><i class="bi bi-box-arrow-right me-1"></i>Гарах</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-3">
<div id="toast-wrap" style="position:fixed;top:70px;right:16px;z-index:9999"></div>

<!-- HOME -->
<div id="view-home" class="view">
  <div class="row justify-content-center">
   <div class="col-lg-10">
    <div class="card mb-4">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-calendar-week me-2"></i><span id="home-week-label">...</span></span>
      <div class="d-flex gap-2 align-items-center">
       <span class="badge bg-light text-dark" id="home-week-dates"></span>
       <button class="btn btn-sm btn-outline-light" onclick="refreshHome()" title="Шинэчлэх"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
     </div>
     <div class="card-body" id="home-users-list">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- REPORT -->
<div id="view-report" class="view">
  <div class="row justify-content-center">
   <div class="col-lg-9">
    <div class="card">
     <div class="card-header d-flex justify-content-between align-items-center">
      <span id="report-title">Тайлан</span>
      <div class="d-flex gap-2 align-items-center">
       <span class="text-white-50 small" id="report-week-label"></span>
       <button class="btn btn-sm btn-outline-light" onclick="refreshReport()" title="Шинэчлэх"><i class="bi bi-arrow-clockwise"></i></button>
       <button class="btn btn-sm btn-outline-light" onclick="showView('home')"><i class="bi bi-arrow-left"></i></button>
      </div>
     </div>
     <div class="card-body">
      <div id="report-behalf-info"></div>
      <div id="report-submitted-info"></div>
      <form id="report-form" onsubmit="submitReport(event)">
       <div id="report-fields"></div>
       <div class="sec-head mt-4"><i class="bi bi-list-check me-1"></i>Ерөнхий тайлан</div>
       <div class="row g-3">
        <div class="col-12">
         <label class="form-label fw-semibold">Энэ 7 хоногт хийсэн ажил</label>
         <textarea class="form-control" id="f-hiiseh" name="hiiseh_ajil" rows="5" placeholder="Хийсэн ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Дараа 7 хоногт хийх ажил</label>
         <textarea class="form-control" id="f-hiikh" name="hiikh_ajil" rows="4" placeholder="Хийх ажлаа бичнэ үү..."></textarea>
        </div>
        <div class="col-12">
         <label class="form-label fw-semibold">Тэмдэглэл / санал</label>
         <textarea class="form-control" id="f-temdeg" name="temdegleltar" rows="2" placeholder="Нэмэлт тэмдэглэл..."></textarea>
        </div>
       </div>
       <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn px-4" style="background:var(--brand);color:#fff" id="submit-btn">
         <i class="bi bi-floppy me-1"></i>Хадгалах
        </button>
        <button type="button" class="btn btn-outline-secondary" onclick="showView('home')">Буцах</button>
       </div>
      </form>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- CONSOLIDATED -->
<div id="view-consolidated" class="view">
  <div class="row">
   <div class="col-12">
    <div class="card mb-3">
     <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span><i class="bi bi-bar-chart me-2"></i>Нэгтгэсэн тайлан — <span id="cons-week-label"></span></span>
      <div class="d-flex gap-2 align-items-center">
       <select class="form-select form-select-sm" id="week-selector" onchange="loadConsolidated()" style="width:auto"></select>
       <button class="btn btn-sm btn-outline-light" onclick="window.print()"><i class="bi bi-printer me-1"></i>Хэвлэх</button>
      </div>
     </div>
     <div class="card-body" id="cons-body">
      <div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>
     </div>
    </div>
   </div>
  </div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="view">
  <div class="row"><div class="col-lg-10 mx-auto">
   <div class="card mb-4">
    <div class="card-header"><i class="bi bi-person-plus me-2"></i>Алба хаагч нэмэх</div>
    <div class="card-body">
     <form onsubmit="adminAddUser(event)" class="row g-3 align-items-end">
      <div class="col-md-2"><label class="form-label">Цол</label>
       <input type="text" id="a-rank" class="form-control" placeholder="д/х"></div>
      <div class="col-md-2"><label class="form-label">Нэр *</label>
       <input type="text" id="a-name" class="form-control" required placeholder="О.Нэр"></div>
      <div class="col-md-2"><label class="form-label">Хэлтэс *</label>
       <select id="a-dept" class="form-select" required>
        <option value="dotood_khyanalt">Дотоод хяналтын хэлтэс</option>
        <option value="tsakhim_burtgel">Цахим бүртгэл, дүн шинжилгээний хэлтэс</option>
        <option value="tolovlolt">Төлөвлөлт, дотоод ажлын хэлтэс</option>
       </select></div>
      <div class="col-md-2"><label class="form-label">Үүрэг *</label>
       <select id="a-role" class="form-select" required></select></div>
      <div class="col-md-2"><label class="form-label">Нууц үг</label>
       <input type="text" id="a-pass" class="form-control" placeholder="1234 (анхны)"></div>
      <div class="col-md-2">
       <label class="form-label">&nbsp;</label>
       <button type="submit" class="btn w-100 d-block" style="background:var(--brand);color:#fff"><i class="bi bi-plus-lg"></i> Нэмэх</button>
      </div>
     </form>
     <hr>
     <div class="row g-2 align-items-end">
      <div class="col-md-4"><label class="form-label fw-semibold">Admin нууц үг солих</label>
       <form onsubmit="changeAdminPass(event)" class="d-flex gap-2">
        <input type="password" id="new-admin-pass" class="form-control" placeholder="Шинэ нууц үг" required>
        <button type="submit" class="btn btn-outline-danger">Солих</button>
       </form>
      </div>
     </div>
    </div>
   </div>
   <div class="card">
    <div class="card-header"><i class="bi bi-people me-2"></i>Алба хаагчдын жагсаалт</div>
    <div class="card-body p-0">
     <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
       <thead><tr><th>#</th><th>Нэр</th><th>Хэлтэс</th><th>Үүрэг</th><th>Байдал</th><th>Цол / Нэр засах</th><th>Үүрэг солих</th><th>Нууц үг / Байдал</th></tr></thead>
       <tbody id="admin-users-table"></tbody>
      </table>
     </div>
    </div>
   </div>
  </div></div>
</div>

</div><!-- /container -->
</div><!-- /main-app -->

function weekDates(offset=0){
  const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1 + offset*7);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate()+6);
  const fmt = x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {start:fmt(mon), end:fmt(sun)};
}
function fmtWeek(start,end){
  return `${start.replace(/-/g,'.')} – ${end.slice(5).replace('-','.')}`;
}
function toast(msg,ok=true){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className=`alert alert-${ok?'success':'danger'} py-2 px-3 shadow`;
  el.style.cssText='min-width:260px;font-size:.9rem';
  el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function catKey(cat){return cat.replace(/[\s,]/g,'_').toLowerCase();}

function computeMedeeSums(){
  function v(nm){var el=document.querySelector('[name="'+nm+'"]');return el?(parseFloat(el.value)||0):0;}
  var p='tbl_нэгдсэн_мэдээ__';
  var biToo=v(p+'bieluu_too'),biDun=v(p+'bieluu_dun');
  var boToo=v(p+'bodit_too'),boDun=v(p+'bodit_dun');
  var ulToo=v(p+'uldegdel_too'),ulDun=v(p+'uldegdel_dun');
  function fmt(n){return n?n.toLocaleString('mn-MN'):'—';}
  function fmtD(n){
    if(!n)return '—';
    if(n>=1e12)return (n/1e12).toFixed(1)+' их наяд';
    if(n>=1e9)return (n/1e9).toFixed(1)+' тэрбум';
    if(n>=1e6)return (n/1e6).toFixed(1)+' сая';
    return n.toLocaleString();
  }
  function set(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
  set('ms-bi-too',fmt(biToo)); set('ms-bi-dun',fmtD(biDun));
  set('ms-bo-too',fmt(boToo)); set('ms-bo-dun',fmtD(boDun));
  set('ms-ul-too',fmt(ulToo)); set('ms-ul-dun',fmtD(ulDun));
}

function computePairById(fid){
  var curr=parseFloat((document.getElementById('curr_'+fid)||{}).value)||0;
  var prev=parseFloat((document.getElementById('prev_'+fid)||{}).value)||0;
  var badge=document.getElementById('badge_'+fid);
  if(!badge) return;
  if(!prev||!curr){badge.innerHTML='';return;}
  var diff=((curr-prev)/prev*100);
  var abs=Math.abs(diff).toFixed(1);
  if(diff>0) badge.innerHTML=`<span class="badge" style="background:#198754;font-size:.78rem;padding:5px 8px">↑ ${abs}%<br><span style="font-weight:400">өссөн</span></span>`;
  else if(diff<0) badge.innerHTML=`<span class="badge" style="background:#dc3545;font-size:.78rem;padding:5px 8px">↓ ${abs}%<br><span style="font-weight:400">буурсан</span></span>`;
  else badge.innerHTML=`<span class="badge bg-secondary" style="font-size:.78rem;padding:5px 8px">= өөрчлөлтгүй</span>`;
}

    <input type="text" class="form-control dyn-label" placeholder="Агуулгын нэр" value="${(l||'').replace(/"/g,'&quot;')}" style="flex:2;min-width:140px">
    <input type="number" class="form-control dyn-num" placeholder="тоо" value="${n||''}" min="0" style="width:90px">
    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.dyn-row').remove()"><i class="bi bi-dash-circle"></i></button>
  </div>`;
}
function addDynRow(wrapId){
  var w=document.getElementById(wrapId);
  var rd=w.querySelector('.dyn-rows');
  if(rd) rd.insertAdjacentHTML('beforeend',dynRowHtml('',''));
}

function computeLavSums(){
  // Query inputs by name to avoid row-index fragility
  function v(nm){var el=document.querySelector('[name="'+nm+'"]');return el?(parseFloat(el.value)||0):0;}
  var cols=['irgen','huuliin_etgeed'];
  function rowSum(cat){return cols.reduce(function(s,col){return s+v('tbl_'+cat+'__'+col);},0);}
  var r0=rowSum('нэг_цэг');
  var r1=rowSum('орон_нутаг');
  var r2=rowSum('арилжааны_банк');
  var r3=rowSum('төрийн_эрх_бүхий_байгууллага');
  var r4=rowSum('хүсэлт');
  var c1=r0+r1+r3+r4;
  var c2=r2;
  var c3=c1+c2;
  var e1=document.getElementById('lav-c1');
  var e2=document.getElementById('lav-c2');
  var e3=document.getElementById('lav-c3');
  if(e1) e1.textContent=c1+' ш';
  if(e2) e2.textContent=c2+' ш';
  if(e3) e3.textContent=c3+' ш';
}

// ── Login ──────────────────────────────────────────────
async function populateLoginSelect(){
  const sel=document.getElementById('login-user');
  sel.innerHTML='<option value="">-- Нэрээ сонгоно уу --</option>';
  await loadUsers();
  for(const u of allUsers.filter(u=>u.isActive)){
    const opt=document.createElement('option');
    opt.value=u.id; opt.textContent=`${u.rank} ${u.name}`;
    sel.appendChild(opt);
  }
}

async function doLogin(e){
  e.preventDefault();
  const uid=document.getElementById('login-user').value;
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Шалгаж байна...';
  try{
    const u=allUsers.find(x=>x.id===uid);
    if(!u){ err.style.display='block'; btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх'; return; }
    const storedPass = u.password || '1234';
    if(pass !== storedPass){
      err.style.display='block';
      btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх'; return;
    }
    loggedInUser=u; isAdmin=false;
    enterApp();
  }catch(ex){ toast('Алдаа: '+ex.message,false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх';
}

function showAdminLogin(){
  const m=new bootstrap.Modal(document.getElementById('adminLoginModal'));
  m.show();
}

async function doAdminLogin(e){
  e.preventDefault();
  const pass=document.getElementById('admin-pass-input').value;
  const err=document.getElementById('admin-login-err');
  err.style.display='none';
  // Check admin password from Firestore settings
  const settingsDoc=await getDoc(doc(db,'settings','admin'));
  const adminPass=settingsDoc.exists()?settingsDoc.data().password:ADMIN_DEFAULT_PASS;
  if(pass!==adminPass){ err.style.display='block'; return; }
  isAdmin=true; loggedInUser={id:'admin',name:'Admin',rank:'',role:'admin'};
  bootstrap.Modal.getInstance(document.getElementById('adminLoginModal'))?.hide();
  enterApp();
}

async function enterApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('nav-username').textContent=loggedInUser.rank+' '+loggedInUser.name;
  if(isAdmin) document.getElementById('nav-admin-btn').classList.remove('d-none');
  else document.getElementById('nav-admin-btn').classList.add('d-none');
  // Нэгтгэл товч: зөвхөн admin болон хэлтсийн дарга харна
  const canSeeNegtle = isAdmin || loggedInUser.role==='head';
  document.getElementById('nav-consolidated-btn').classList.toggle('d-none', !canSeeNegtle);
  if(isAdmin){ showView('admin'); return; }
  if(!currentWeek){ currentWeek=weekDates(); }
  currentUser=loggedInUser;
  if(loggedInUser.role==='head'){ showView('home'); return; }
  await loadWeekReports(currentWeek.start);
  renderReportForm();
  showView('report');
}

function doLogout(){
  loggedInUser=null; isAdmin=false; currentUser=null;
  document.getElementById('login-page').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function showView(name){
  // Нэгтгэл: зөвхөн admin эсвэл дарга
  if(name==='consolidated' && !isAdmin && loggedInUser?.role!=='head') return;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(name==='home') renderHome();
  if(name==='consolidated') loadConsolidated();
  if(name==='admin') renderAdmin();
}

// ── Seed users ─────────────────────────────────────────
async function seedUsers(){
  const snap = await getDocs(collection(db,'users'));
  if(snap.size>0) return;
  for(let i=0;i<INIT_USERS.length;i++){
    const u=INIT_USERS[i];
    await setDoc(doc(db,'users',String(i+1)),{...u,isActive:true,password:'1234',createdAt:serverTimestamp()});
  }
  // Set default admin password
  await setDoc(doc(db,'settings','admin'),{password:ADMIN_DEFAULT_PASS});
}

// ── Load users ─────────────────────────────────────────
async function loadUsers(force=false){
  if(!force && allUsers.length>0) return allUsers;
  const snap=await getDocs(query(collection(db,'users'),orderBy('__name__')));
  allUsers=[];
  snap.forEach(d=>allUsers.push({id:d.id,...d.data()}));
  return allUsers;
}

// ── Current week reports ───────────────────────────────
async function loadWeekReports(weekStart){
  const snap=await getDocs(query(collection(db,'reports'),where('weekStart','==',weekStart)));
  allReports={};
  snap.forEach(d=>{const r=d.data(); allReports[r.userId]=r;});
}

        <th>Байдал</th>
        <th style="width:110px" class="text-center">Үйлдэл</th>

      let idx=1;
      for(const u of dus){
        const rep=allReports[u.id];

        const d=rep?rep.data||{}:{};

        const secs=ROLE_FORMS[u.role]||[];

// ── Submit report ───────────────────────────────────────
async function submitReport(e){
  if(e) e.preventDefault();
  if(!currentUser||!currentWeek) return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Хадгалж байна...';
  try{
    const data={};
    document.querySelectorAll('#report-fields input,#report-fields select,#report-fields textarea').forEach(el=>{
      if(el.name) data[el.name]=el.type==='number'?(el.value===''?'':Number(el.value)):el.value;
    });
    // serialize dyn rows
    document.querySelectorAll('[id^="dyn_"]').forEach(wrap=>{
      const fid=wrap.id.replace(/^dyn_/,'');
      const rows=[];
      wrap.querySelectorAll('.dyn-row').forEach(row=>{
        const l=row.querySelector('.dyn-label').value.trim();
        const n=row.querySelector('.dyn-num').value;
        if(l||n) rows.push({l,n:parseInt(n)||0});
      });
      if(rows.length) data[fid]=JSON.stringify(rows);
    });
    // serialize negj rows
    document.querySelectorAll('[id^="negj_"]').forEach(wrap=>{
      const fid=wrap.id.replace(/^negj_/,'');
      const rows=[];
      wrap.querySelectorAll('.negj-row').forEach(row=>{
        const t=row.querySelector('.negj-sel')?.value||row.querySelector('.negj-txt')?.value||'';
        const n=row.querySelector('.negj-num').value;
        if(t||n) rows.push({t,n:parseInt(n)||0});
      });
      if(rows.length) data[fid]=JSON.stringify(rows);
    });
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const submittedAt=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const rid=`${currentUser.id}_${currentWeek.start}`;
    await setDoc(doc(db,'reports',rid),{
      userId:currentUser.id,weekStart:currentWeek.start,
      submittedAt,data,updatedAt:serverTimestamp()
    });
    allReports[currentUser.id]={userId:currentUser.id,weekStart:currentWeek.start,submittedAt,data};
    toast('Амжилттай хадгаллаа ✓');
    renderReportForm();
  }catch(ex){ toast('Алдаа: '+ex.message,false); }
  btn.disabled=false; btn.innerHTML='<i class="bi bi-send me-1"></i>Илгээх';
}

// ── Populate week selector ──────────────────────────────
function populateWeekSelector(){
  const sel=document.getElementById('week-selector');
  if(!sel) return;
  if(sel.options.length>0) return; // already populated
  for(let i=0;i<12;i++){
    const w=weekDates(-i);
    const opt=document.createElement('option');
    opt.value=w.start;
    opt.textContent=(i===0?'Энэ 7 хоног: ':'')+(i===1?'Өмнөх 7 хоног: ':'')+fmtWeek(w.start,w.end);
    sel.appendChild(opt);
  }
}

// ── Consolidated: aggregate numeric data across multiple submissions ──
function aggDataObjs(role, dataArr){
  // Returns one merged data object: sums all numeric fields, skips text/dyn/negj/pct/unitSel
  const result={};
  const secs=ROLE_FORMS[role]||[];
  for(const sec of secs){
    if(sec.table){
      for(const cat of sec.cats){
        const ck='tbl_'+catKey(cat)+'__';
        for(const col of sec.cols){
          const subs=col.stack||[{id:col.id}];
          for(const sub of subs){
            if(sub.unitSel||sub.allowNeg) continue; // skip ₮ дүн & % fields
            const key=ck+sub.id;
            result[key]=dataArr.reduce((s,d)=>s+(parseFloat(d[key])||0),0);
          }
        }
      }
    } else if(sec.f){
      for(const f of sec.f){
        if(f.ta||f.dyn||f.negj||f.allowNeg) continue;
        if(f.prev){
          result[f.id]=dataArr.reduce((s,d)=>s+(parseFloat(d[f.id])||0),0);
          result[f.id+'_prev']=dataArr.reduce((s,d)=>s+(parseFloat(d[f.id+'_prev'])||0),0);
        } else {
          result[f.id]=dataArr.reduce((s,d)=>s+(parseFloat(d[f.id])||0),0);
        }
      }
    }
  }
  return result;
}

        <div class="d-flex align-items-center justify-content-between mb-3">
          <span class="fw-bold" style="color:#1a3a6b">${ROLE_LABELS[role]||role}</span>
          <div class="d-flex gap-1 flex-wrap">`;
      for(const u of roleUsers){
        const done=!!allReports[u.id];
        html+=`<span class="badge ${done?'bg-success':'bg-danger'}" style="font-size:.7rem">${u.rank} ${u.name}</span>`;
      }
      html+=`</div></div>`;
      if(submitted.length){
        // Aggregated data
        const allData=submitted.map(u=>allReports[u.id].data||{});
        const aggD=aggDataObjs(role,allData);
        html+=renderRoleAgg(role,aggD,submitted);
        // Individual details — collapsible
        if(submitted.length>1||(submitted.length===1&&ROLE_FORMS[role].some(s=>s.f&&s.f.some(f=>f.ta||f.dyn||f.negj)))){
          const detId='det_'+dk+'_'+role;
          html+=`<div class="mt-2">
            <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('${detId}').classList.toggle('d-none')" style="font-size:.75rem">
              <i class="bi bi-list-ul me-1"></i>Дэлгэрэнгүй (хүн бүрийн)
            </button>
            <div id="${detId}" class="d-none mt-2">`;
          for(const u of submitted){
            const d=allReports[u.id].data||{};
            html+=`<div class="mb-2 p-2 rounded" style="background:#f8f9fa;border:1px solid #e0e0e0">
              <div class="fw-semibold mb-1" style="font-size:.8rem"><i class="bi bi-person me-1"></i>${u.rank} ${u.name} <span class="text-muted">${allReports[u.id].submittedAt||''}</span></div>
              ${consPersonDetail(u,d)}
            </div>`;
          }
          html+=`</div></div>`;
        }
      } else {
        html+=`<div class="text-muted" style="font-size:.85rem"><i class="bi bi-clock me-1"></i>Тайлан ирээгүй байна</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div></div>`;
  }
  if(!html) html='<div class="alert alert-info">Энэ 7 хоногт тайлан байхгүй байна.</div>';
  el.querySelector('#cons-body').innerHTML=html;
}

// ── Admin ───────────────────────────────────────────────
async function renderAdmin(){
  await loadUsers(true);
  const tbody=document.getElementById('admin-users-table');
  if(!tbody) return;
  tbody.innerHTML='';
  allUsers.forEach(u=>{
    const tr=document.createElement('tr');
    if(!u.isActive) tr.style.opacity='.5';
    tr.innerHTML=`<td>${u.id}</td>
      <td><input class="form-control form-control-sm" value="${u.rank||''}" onchange="changeRankName('${u.id}','rank',this.value)"></td>
      <td><input class="form-control form-control-sm" value="${u.name||''}" onchange="changeRankName('${u.id}','name',this.value)"></td>
      <td><select class="form-select form-select-sm" onchange="changeRole('${u.id}',this.value)">
        ${Object.entries(ROLE_LABELS).map(([k,v])=>`<option value="${k}"${u.role===k?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td><select class="form-select form-select-sm" onchange="changeDept('${u.id}',this.value)">
        ${Object.entries(DEPT_NAMES).map(([k,v])=>`<option value="${k}"${u.department===k?' selected':''}>${v}</option>`).join('')}
      </select></td>
      <td><input class="form-control form-control-sm" type="password" placeholder="Шинэ нууц үг" id="pw_${u.id}">
          <button class="btn btn-sm btn-outline-secondary mt-1" onclick="changePass('${u.id}')">Солих</button></td>
      <td><button class="btn btn-sm ${u.isActive?'btn-outline-danger':'btn-outline-success'}" onclick="toggleActive('${u.id}',${!u.isActive})">${u.isActive?'Идэвхгүй болгох':'Идэвхжүүлэх'}</button></td>`;
    tbody.appendChild(tr);
  });
}

async function adminAddUser(){
  const rank=document.getElementById('new-rank').value.trim();
  const name=document.getElementById('new-name').value.trim();
  const role=document.getElementById('new-role').value;
  const dept=document.getElementById('new-dept').value;
  if(!name){toast('Нэр оруулна уу',false);return;}
  const newId=String(Math.max(0,...allUsers.map(u=>parseInt(u.id)||0))+1);
  await setDoc(doc(db,'users',newId),{rank,name,role,department:dept,isActive:true,password:'1234',createdAt:serverTimestamp()});
  toast('Нэмэгдлээ ✓');
  await renderAdmin();
}

async function changeRankName(uid,field,val){
  await updateDoc(doc(db,'users',uid),{[field]:val});
  const u=allUsers.find(x=>x.id===uid); if(u) u[field]=val;
}
async function changeRole(uid,val){
  await updateDoc(doc(db,'users',uid),{role:val});
  const u=allUsers.find(x=>x.id===uid); if(u) u.role=val;
}
async function changeDept(uid,val){
  await updateDoc(doc(db,'users',uid),{department:val});
  const u=allUsers.find(x=>x.id===uid); if(u) u.department=val;
}
window.changeDept=changeDept;
async function changePass(uid){
  const el=document.getElementById('pw_'+uid);
  if(!el||!el.value.trim()){toast('Нууц үг оруулна уу',false);return;}
  await updateDoc(doc(db,'users',uid),{password:el.value.trim()});
  el.value=''; toast('Нууц үг солигдлоо ✓');
}
async function toggleActive(uid,state){
  await updateDoc(doc(db,'users',uid),{isActive:state});
  const u=allUsers.find(x=>x.id===uid); if(u) u.isActive=state;
  renderAdmin();
}
async function changeAdminPass(e){
  e.preventDefault();
  const np=document.getElementById('new-admin-pass').value.trim();
  const cp=document.getElementById('confirm-admin-pass').value.trim();
  if(!np){toast('Нууц үг оруулна уу',false);return;}
  if(np!==cp){toast('Нууц үг таарахгүй байна',false);return;}
  await setDoc(doc(db,'settings','admin'),{password:np});
  toast('Admin нууц үг солигдлоо ✓');
  document.getElementById('new-admin-pass').value='';
  document.getElementById('confirm-admin-pass').value='';
}
function refreshReport(){ renderReportForm(); toast('Шинэчлэгдлээ ✓'); }

// ── Init ────────────────────────────────────────────────
seedUsers().then(()=>populateLoginSelect()).catch(e=>{ populateLoginSelect(); console.error(e); });
